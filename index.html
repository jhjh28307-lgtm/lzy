<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>告白</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
min-height:100vh;
background:linear-gradient(135deg,#ff9a9e,#fad0c4,#a18cd1,#fbc2eb);
overflow:hidden;
font-family:"Microsoft YaHei",sans-serif
}
.heart{
position:absolute;
width:20px;height:20px;
background:#ff3e6c;
transform:rotate(45deg);
animation:float 3s infinite
}
.heart::before,.heart::after{
content:'';
width:20px;height:20px;
background:#ff3e6c;
border-radius:50%;
position:absolute
}
.heart::before{left:-10px;top:0;}
.heart::after{left:0;top:-10px;}
@keyframes float{
0%{opacity:0;bottom:0;transform:rotate(45deg) scale(.5)}
50%{opacity:1}
100%{opacity:0;bottom:100vh;transform:rotate(45deg) scale(1.2)}
}
.text-box{
position:absolute;
top:50%;left:50%;
transform:translate(-50%,-50%);
text-align:center;
z-index:99
}
.title{
font-size:40px;
font-weight:bold;
color:#fff;
text-shadow:0 0 15px #ff3e6c;
opacity:0;
animation:fadeIn 2s forwards 1s
}
.sub-title{
font-size:20px;
color:#fff;
margin-top:10px;
opacity:0;
animation:fadeIn 2s forwards 2s
}
.click-heart{
width:70px;height:70px;
background:#ff3e6c;
transform:rotate(45deg);
margin:30px auto;
cursor:pointer;
box-shadow:0 0 20px #ff3e6c;
opacity:0;
animation:fadeIn 1.5s forwards 3s
}
@keyframes fadeIn{to{opacity:1}}
</style>
</head>
<body>
<audio id="bgm" loop src="https://music.163.com/song/media/outer/url?id=1890745412.mp3">
<div class="text-box">
<h1 class="title">林泽洋，我喜欢你</h1>
<p class="sub-title">我的世界，只为你心动</p>
<div class="click-heart" onclick="show()"></div>
</div>
<script>
setInterval(()=>{
let h=document.createElement('div');
h.className='heart';
h.style.left=Math.random()*100+'vw';
document.body.appendChild(h);
setTimeout(()=>h.remove(),5000)
},300);
function show(){
document.getElementById('bgm').play();
alert('林泽洋，遇见你很幸运，我想和你在一起❤️')
}
</script>
</body>
</html>
