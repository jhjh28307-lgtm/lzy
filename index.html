<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>林泽洋 专属心动</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
background:#000;color:#fff;
font-family:微软雅黑;
text-align:center;
padding:15vh 20px;
overflow-x:hidden;
min-height:100vh;
}
.name{
font-size:5rem;
color:#ff5e99;
font-weight:bold;
text-shadow:0 0 20px #ff5e99, 0 0 40px #ff5e99;
animation:fadeIn 2s ease forwards;
}
.text{
font-size:1.8rem;
margin:30px 0 50px;
line-height:2;
opacity:0;
animation:fadeIn 2s ease forwards 1.5s;
}
.btn{
display:inline-block;
width:160px;
padding:16px 0;
margin:0 15px 20px;
font-size:20px;
border:none;
border-radius:40px;
cursor:pointer;
transition:all 0.3s ease;
}
.btn-yes{
background:linear-gradient(45deg,#ff5e99,#ffd700);
color:#fff;
box-shadow:0 0 25px rgba(255,94,153,0.9);
}
.btn-more{
background:#222;
color:#fff;
border:2px solid #ff5e99;
box-shadow:0 0 15px rgba(255,94,153,0.6);
}
.btn-music{
position:fixed;
top:20px;
right:20px;
width:50px;
height:50px;
border-radius:50%;
background:#ff5e99;
color:#fff;
font-size:24px;
border:none;
cursor:pointer;
box-shadow:0 0 15px rgba(255,94,153,0.8);
z-index:999;
}
@keyframes fadeIn{
from{opacity:0;transform:translateY(30px)}
to{opacity:1;transform:translateY(0)}
}
canvas{
position:fixed;
top:0;left:0;
width:100%;height:100%;
pointer-events:none;
z-index:-1;
}
</style>
</head>
<body>
<!-- 背景音乐：《嘉宾》原版可商用链接，循环播放 -->
<audio id="bgMusic" loop preload="auto">
  <source src="https://music.163.com/song/media/outer/url?id=1387579933.mp3" type="audio/mpeg">


<!-- 音乐控制按钮 -->
<button class="btn-music" id="musicBtn" onclick="toggleMusic()">🎵</button>

<canvas id="heartCanvas"></canvas>
<div class="name">林泽洋</div>
<div class="text">
林泽洋，我喜欢你<br>
不止心动，更是满心欢喜<br>
你愿意，和我在一起吗？
</div><button class="btn btn-yes" id="btnYes">我愿意💗</button>
<br>
<button class="btn btn-more" id="btnMore1">查看更多心意</button>
<button class="btn btn-more" id="btnMore2">再等等我</button>

<script>
// 音乐控制（《嘉宾》循环播放）
const bgMusic = document.getElementById('bgMusic');
const musicBtn = document.getElementById('musicBtn');
let isPlaying = false;

// 切换音乐播放/暂停
function toggleMusic() {
  if(isPlaying) {
    bgMusic.pause();
    musicBtn.textContent = '🔇';
  } else {
    bgMusic.play();
    musicBtn.textContent = '🎵';
  }
  isPlaying = !isPlaying;
}

// 按钮点击事件（100%兼容APK）
const btnYes = document.getElementById('btnYes');
const btnMore1 = document.getElementById('btnMore1');
const btnMore2 = document.getElementById('btnMore2');

btnYes.addEventListener('click', function() {
  alert('太好了！林泽洋，余生请多指教💖\n我会用一辈子，对你好');
});
btnMore1.addEventListener('click', function() {
  alert('林泽洋，我的世界因你而亮，往后余生只想和你一起💖');
});
btnMore2.addEventListener('click', function() {
  alert('没关系，我会一直等你，直到你点头为止💌');
});

// 页面点击触发音乐（解决浏览器自动播放限制）
document.body.addEventListener('click', function() {
  if(!isPlaying) {
    bgMusic.play();
    musicBtn.textContent = '🎵';
    isPlaying = true;
  }
});// 爱心粒子动画（APK/PWA双兼容）
const canvas = document.getElementById('heartCanvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];
const particleCount = 600;
class Particle {
  constructor(x, y) {
    this.x = x; this.y = y;
    this.size = Math.random() * 3 + 1;
    this.color = `hsl(${Math.random() * 60 + 330}, 100%, 60%)`;
  }
  draw() {
    ctx.fillStyle = this.color;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fill();
  }
}

function init() {
  particles = [];
  const heartX = canvas.width / 2;
  const heartY = canvas.height / 2;
  const size = Math.min(canvas.width, canvas.height) * 0.25;
  for (let i = 0; i < particleCount; i++) {
    const t = Math.random() * Math.PI * 2;
    const x = 16 * Math.sin(t) ** 3;
    const y = 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t);
    particles.push(new Particle(heartX + x * size / 16, heartY - y * size / 16));
  }
}

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  for (let p of particles) p.draw();
  requestAnimationFrame(animate);
}

init();
animate();
</script>
</body>
</html>
