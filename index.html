<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>表白 · 林泽洋</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
background:#000;color:#fff;
font-family:微软雅黑;
text-align:center;padding:20vh 20px;
}
.name{
font-size:42px;color:#ff5e99;
font-weight:bold;text-shadow:0 0 15px #ff5e99;
}
.text{
font-size:20px;margin:20px 0 40px;line-height:1.8;
}
.btn{
display:inline-block;width:120px;padding:12px 0;
margin:0 10px;font-size:18px;
border:none;border-radius:30px;
}
.btn-yes{background:#ff5e99;color:#fff;}
.btn-no{background:#333;color:#aaa;}
</style>
</head>
<body>
<div class="name">林泽洋</div>
<div class="text">
遇见你的那一刻<br>
心动就有了答案，可以在一起吗？
</div><button class="btn btn-yes" onclick="alert('太好了！💗')">我愿意</button>
<button class="btn btn-no" onclick="alert('我会一直等你✨')">再考虑</button>
</body>
</html>
